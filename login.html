<!DOCTYPE html>
<html>
<head>
    <title>LifeHub Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff758c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            color: white;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff758c;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff5e78;
        }

        a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login to LifeHub</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have account? <a href="/register">Register</a></p>
</div>

</body>
</html>
