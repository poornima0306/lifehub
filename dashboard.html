<!DOCTYPE html>
<html>
<head>
    <title>LifeHub Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e1e2f, #2c2c3e);
            color: white;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 550px;
            margin: 20px auto;
            background: #2c2c3e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
        }

        h2, h3 { text-align: center; }

        .logout {
            float: right;
            background: red;
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .add-task-box {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #8e2de2;
        }

        .add-task-box input,
        .add-task-box select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: none;
            margin-bottom: 8px;
        }

        .add-task-box button {
            width: 100%;
            background: white;
            color: #4a00e0;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .task-card {
            background: linear-gradient(135deg, #2c2c3e, #3a3a5a);
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .task-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px #8e2de2;
        }

        .task-text.done { text-decoration: line-through; color: gray; }
        .task-text.overdue { color: #ff1744; }
        .task-text.due-soon { color: orange; }

        .task-date { font-size: 12px; color: #ccc; }

        .task-priority.high { color: red; }
        .task-priority.medium { color: yellow; }
        .task-priority.low { color: lightgreen; }

        .progress-bar-container {
            width: 100%;
            background: #444;
            border-radius: 6px;
            height: 10px;
            margin-top: 6px;
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            background: #00c853;
        }

        .actions {
            margin-top: 10px;
        }

        button {
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin: 3px;
        }

        .complete-btn { background: #00c853; color: white; }
        .delete-btn { background: #ff1744; color: white; }
        .update-btn { background: #2196f3; color: white; }
    </style>
</head>

<body>

<div class="container">

    <h2>Welcome {{ username }} 👋</h2>
    <a href="/logout"><button class="logout">Logout</button></a>

    <!-- ADD TASK -->
    <h3>Add Task</h3>
    <div class="add-task-box">
        <form action="/add_task" method="POST">
            <input type="text" name="task" placeholder="Task title" required>
            <input type="datetime-local" name="due_date" required>

            <select name="category">
                <option>Personal</option>
                <option>Work</option>
                <option>Study</option>
            </select>

            <select name="priority">
                <option value="High">High</option>
                <option value="Medium" selected>Medium</option>
                <option value="Low">Low</option>
            </select>

            <button type="submit">Add Task</button>
        </form>
    </div>

    <!-- PENDING TASKS -->
    <h3>📌 Pending Tasks</h3>

    {% for t in pending_tasks %}
    <div class="task-card"
         style="border-left: 5px solid
         {% if t['priority']=='High' %}red
         {% elif t['priority']=='Medium' %}yellow
         {% else %}green
         {% endif %};">

        <div class="task-text
            {% if t['due_date'] < today %}overdue
            {% elif t['due_date'] <= upcoming %}due-soon
            {% endif %}">
            📝 {{ t["task"] }}
        </div>

        <div class="task-date">📅 {{ t["due_date"] }}</div>

        <div class="progress-bar-container">
            <div class="progress-bar" style="width: {{ t['progress'] }}%"></div>
        </div>

        <form action="/update_progress" method="POST">
            <input type="hidden" name="task_id" value="{{ t['id'] }}">
            <input type="range" name="progress" min="0" max="100" value="{{ t['progress'] }}">
            <button class="update-btn">Update</button>
        </form>

        <div class="task-priority
            {% if t['priority']=='High' %}high
            {% elif t['priority']=='Medium' %}medium
            {% else %}low
            {% endif %}">
            🔺 {{ t["priority"] }}
        </div>

        <div class="actions">
            <form action="/complete_task" method="POST" style="display:inline;">
                <input type="hidden" name="task_id" value="{{ t['id'] }}">
                <button class="complete-btn">✔</button>
            </form>

            <form action="/delete_task" method="POST" style="display:inline;">
                <input type="hidden" name="task_id" value="{{ t['id'] }}">
                <button class="delete-btn">❌</button>
            </form>
        </div>
    </div>
    {% endfor %}

    <!-- COMPLETED TASKS -->
    <h3>✅ Completed Tasks</h3>

    {% for t in completed_tasks %}
    <div class="task-card">
        <div class="task-text done">✔ {{ t["task"] }}</div>
        <div class="task-date">Done: {{ t["due_date"] }}</div>

        <form action="/delete_task" method="POST">
            <input type="hidden" name="task_id" value="{{ t['id'] }}">
            <button class="delete-btn">Delete</button>
        </form>
    </div>
    {% endfor %}

</div>

<!-- 🔔 NOTIFICATIONS -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    if (Notification.permission === "default") {
        Notification.requestPermission();
    }

    {% for t in pending_tasks %}
        let notified = localStorage.getItem("task_{{ t['id'] }}");

        {% if t['due_date'] <= today %}
            if (!notified && Notification.permission === "granted") {
                new Notification("⏰ Task Reminder", {
                    body: "{{ t['task'] }} is due!",
                });

                localStorage.setItem("task_{{ t['id'] }}", "done");
            }
        {% endif %}
    {% endfor %}

});
</script>

</body>
</html>
